<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Couture POS — Retail operations suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F6F7;
    --surface: #FFFFFF;
    --border: #E6E8EB;
    --border-soft: #EEF0F2;
    --ink: #0F1729;
    --ink-2: #2B3447;
    --muted: #667085;
    --muted-2: #98A2B3;
    --brand-1: #0058BA;
    --brand-2: #6C9FFF;
    --brand-grad: linear-gradient(135deg, #0058BA 0%, #6C9FFF 100%);
    --brand-soft: #EAF1FB;
    --success: #10B981;
    --success-soft: #E8F7F0;
    --warning: #F59E0B;
    --warning-soft: #FEF3E0;
    --danger: #EF4444;
    --danger-soft: #FCEBEB;
    --shadow-sm: 0 1px 2px rgba(15,23,41,.04), 0 1px 1px rgba(15,23,41,.03);
    --shadow-md: 0 1px 3px rgba(15,23,41,.05), 0 4px 12px rgba(15,23,41,.04);
    --shadow-lg: 0 8px 28px rgba(15,23,41,.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'cv11','ss01';
    font-size: 14px;
    line-height: 1.5;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #D6D9DD; border-radius: 6px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }
  .serif { font-family: 'Instrument Serif', serif; letter-spacing: -0.01em; }
  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; color: inherit; }

  /* App shell */
  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--bg);
    border-right: 1px solid var(--border);
    padding: 18px 14px 24px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .brand {
    display: flex; align-items: center; gap: 10px; padding: 6px 8px 18px; border-bottom: 1px solid var(--border-soft); margin-bottom: 12px;
  }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 8px; background: var(--brand-grad);
    display: grid; place-items: center; color: white; font-weight: 700;
    box-shadow: 0 4px 10px rgba(0,88,186,.25);
  }
  .brand-title { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1; color: var(--ink); }
  .brand-sub { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: .02em; }

  .nav-group-label {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted-2);
    padding: 14px 10px 6px; font-weight: 600;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; cursor: pointer; user-select: none;
    color: var(--ink-2); font-size: 13.5px; font-weight: 500;
    transition: background .15s, color .15s;
  }
  .nav-item:hover { background: rgba(15,23,41,.04); }
  .nav-item.active {
    background: var(--brand-grad); color: white;
    box-shadow: 0 6px 14px rgba(0,88,186,.25);
  }
  .nav-item.active .nav-ic { color: white; }
  .nav-ic { width: 16px; height: 16px; flex: none; color: var(--muted); }
  .nav-item.active .nav-ic { color: white; }
  .nav-badge {
    margin-left: auto; font-size: 10.5px; padding: 1px 6px; border-radius: 999px;
    background: rgba(15,23,41,.06); color: var(--ink-2); font-weight: 600;
  }
  .nav-item.active .nav-badge { background: rgba(255,255,255,.2); color: white; }

  .topbar {
    height: 56px; padding: 0 24px; background: var(--surface);
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .topbar .crumbs { color: var(--muted); font-size: 13px; }
  .topbar .crumbs strong { color: var(--ink); font-weight: 600; }
  .search {
    flex: 1; max-width: 460px; position: relative;
  }
  .search input {
    width: 100%; height: 36px; border: 1px solid var(--border); border-radius: 8px;
    padding: 0 12px 0 34px; background: var(--bg); font-size: 13px; outline: none;
  }
  .search input:focus { border-color: var(--brand-2); background: white; box-shadow: 0 0 0 3px rgba(108,159,255,.15); }
  .search svg { position: absolute; left: 11px; top: 10px; color: var(--muted); }
  .topbar-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: white;
    display: grid; place-items: center; cursor: pointer; color: var(--ink-2);
  }
  .icon-btn:hover { background: var(--bg); }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; background: var(--brand-grad);
    display: grid; place-items: center; color: white; font-weight: 600; font-size: 12px;
  }
  .user-chip { display: flex; align-items: center; gap: 8px; padding: 4px 10px 4px 4px; border: 1px solid var(--border); border-radius: 999px; background: white; }
  .user-chip-name { font-weight: 600; font-size: 12.5px; }
  .user-chip-role { font-size: 11px; color: var(--muted); }

  .main { padding: 24px; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .page-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

  /* Cards & primitives */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: var(--shadow-sm);
  }
  .card-pad { padding: 16px; }
  .card-pad-lg { padding: 20px; }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border-soft);
  }
  .card-head h3 { margin: 0; font-size: 14px; font-weight: 600; }
  .card-head .card-sub { color: var(--muted); font-size: 12px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 12px; }
  .kpi-grid.cols-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }
  .kpi-grid.cols-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
  .kpi {
    background: white; border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; min-width: 0;
  }
  .kpi-label { font-size: 11.5px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
  .kpi-value { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .kpi-sub { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .kpi.accent { background: linear-gradient(135deg, rgba(0,88,186,.04), rgba(108,159,255,.06)); border-color: #D9E5F4; }
  .delta-up { color: var(--success); font-weight: 600; }
  .delta-down { color: var(--danger); font-weight: 600; }
  .delta-neutral { color: var(--muted); }

  .pill {
    display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600; line-height: 1.6;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill-success { background: var(--success-soft); color: #047857; }
  .pill-warning { background: var(--warning-soft); color: #B45309; }
  .pill-danger { background: var(--danger-soft); color: #B91C1C; }
  .pill-info { background: var(--brand-soft); color: var(--brand-1); }
  .pill-neutral { background: #F1F2F4; color: var(--ink-2); }

  .btn {
    display: inline-flex; align-items: center; gap: 8px; height: 36px; padding: 0 14px;
    border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; border: 1px solid transparent;
    transition: filter .15s, background .15s;
  }
  .btn-primary { background: var(--brand-grad); color: white; box-shadow: 0 4px 12px rgba(0,88,186,.22); }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-ghost { background: white; color: var(--ink); border-color: var(--border); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-soft { background: var(--brand-soft); color: var(--brand-1); }
  .btn-soft:hover { background: #DEE9F8; }
  .btn-sm { height: 30px; padding: 0 10px; font-size: 12px; }
  .btn-icon { width: 36px; padding: 0; justify-content: center; }
  .btn-danger-ghost { background: white; color: var(--danger); border-color: var(--border); }

  .tabs { display: flex; gap: 4px; padding: 4px; background: white; border: 1px solid var(--border); border-radius: 10px; }
  .tab {
    padding: 6px 12px; border-radius: 7px; font-size: 12.5px; font-weight: 600; color: var(--muted);
    cursor: pointer; border: 1px solid transparent;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { background: var(--brand-grad); color: white; }

  .seg { display: inline-flex; padding: 3px; background: white; border: 1px solid var(--border); border-radius: 8px; }
  .seg button {
    border: none; background: transparent; padding: 6px 10px; font-size: 12px; font-weight: 600; color: var(--muted); border-radius: 6px; cursor: pointer;
  }
  .seg button.on { background: var(--brand-grad); color: white; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; font-weight: 600; font-size: 11.5px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em; padding: 10px 14px;
    border-bottom: 1px solid var(--border-soft); background: #FAFBFC;
  }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border-soft); vertical-align: middle; }
  tbody tr:hover { background: #FAFBFC; }
  tbody tr.selected { background: var(--brand-soft); }
  tbody tr:last-child td { border-bottom: none; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--ink-2); font-weight: 500; }
  .field input, .field select, .field textarea {
    height: 36px; padding: 0 12px; border: 1px solid var(--border); border-radius: 8px; background: white; font-size: 13px; outline: none;
  }
  .field textarea { height: auto; padding: 10px 12px; min-height: 80px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand-2); box-shadow: 0 0 0 3px rgba(108,159,255,.12); }

  .toggle { width: 36px; height: 20px; border-radius: 999px; background: #D6D9DD; position: relative; cursor: pointer; transition: background .15s; flex: none; }
  .toggle.on { background: var(--brand-1); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: white; transition: left .15s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
  .toggle.on::after { left: 18px; }

  .divider { height: 1px; background: var(--border-soft); margin: 14px 0; }
  .grid { display: grid; gap: 16px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .row-between { display: flex; gap: 12px; align-items: center; justify-content: space-between; }

  /* Layouts */
  .list-detail { display: grid; grid-template-columns: 1fr 380px; gap: 16px; align-items: stretch; }
  .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* Chart helpers (SVG-based) */
  .chart-area { width: 100%; height: 180px; display: block; }
  .legend { display: flex; gap: 14px; font-size: 12px; color: var(--muted); }
  .legend .lg-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }

  /* Image placeholders */
  .img-ph {
    background:
      repeating-linear-gradient(135deg, #EEF1F4 0 8px, #E4E8EC 8px 16px);
    border: 1px solid var(--border); border-radius: 10px;
    display: grid; place-items: center; color: var(--muted-2); font-family: 'JetBrains Mono', monospace; font-size: 11px;
  }

  /* Util */
  .num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }
  .ink { color: var(--ink); }
  .muted { color: var(--muted); }
  .muted-2 { color: var(--muted-2); }
  .right { text-align: right; }
  .nowrap { white-space: nowrap; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .strong { font-weight: 600; }
  .h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .h2 { font-size: 16px; font-weight: 600; }
  .h3 { font-size: 14px; font-weight: 600; }
  .h4 { font-size: 12.5px; font-weight: 600; color: var(--ink-2); text-transform: uppercase; letter-spacing: .04em; }

  .progress { height: 6px; background: #EEF0F2; border-radius: 999px; overflow: hidden; }
  .progress > div { height: 100%; background: var(--brand-grad); }

  .check {
    width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid #C4C9D0; display: inline-grid; place-items: center; flex: none;
  }
  .check.on { background: var(--brand-grad); border-color: transparent; color: white; }
  .check.on::after { content: '✓'; font-size: 11px; line-height: 1; }

  .scroll-x { overflow-x: auto; }
  .table-wrap { overflow: hidden; border-radius: 12px; border: 1px solid var(--border); background: white; box-shadow: var(--shadow-sm); }

  .empty-tile { border: 1px dashed var(--border); border-radius: 10px; padding: 16px; color: var(--muted); text-align: center; font-size: 12.5px; }

  /* Module hub cards */
  .hub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .hub-card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; transition: box-shadow .15s, transform .15s; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 10px; min-height: 168px; }
  .hub-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .hub-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--brand-soft); color: var(--brand-1); display: grid; place-items: center; }

  /* Settings detail */
  .settings-detail { display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: start; }
  .settings-side { position: sticky; top: 80px; }
  .settings-side a { display: block; padding: 8px 10px; border-radius: 7px; color: var(--ink-2); font-size: 13px; cursor: pointer; }
  .settings-side a.on { background: var(--brand-soft); color: var(--brand-1); font-weight: 600; }

  /* Bills cart */
  .bill-grid { display: grid; grid-template-columns: 1.1fr 480px; gap: 16px; height: calc(100vh - 56px - 48px); }
  @media (max-width: 1280px) { .bill-grid { grid-template-columns: 1fr 420px; } }

  .key {
    border: 1px solid var(--border); background: white; padding: 1px 5px; font-size: 10.5px; border-radius: 4px; color: var(--muted); font-family: 'JetBrains Mono', monospace;
  }

  /* Smooth chart line */
  .grid-line { stroke: #EEF0F2; stroke-width: 1; }

  .scroll-y { overflow-y: auto; }
  .h-full { height: 100%; }

  /* Donut */
  .donut-track { fill: none; stroke: #EEF0F2; stroke-width: 10; }
  .donut-fill { fill: none; stroke: url(#brandGrad); stroke-width: 10; stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</body>
